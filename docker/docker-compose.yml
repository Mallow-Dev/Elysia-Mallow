version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC API
    volumes:
      - ./qdrant_storage:/qdrant/storage:z
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      # Avoid needing curl/wget (not present in base image); rely on log line emitted when HTTP server is listening
      test: ["CMD-SHELL", "grep -q 'HTTP listening on 6333' /proc/1/fd/1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  elysia:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      - VECTOR_DB_TYPE=qdrant
      - QDRANT_URL=http://qdrant:6333
      - PYTHONPATH=/app
    volumes:
      - ..:/app
    command: ["python", "-m", "elysia.cli"]